apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRouter
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
  name: vllmrouter-sample
spec:
  # Enable the router deployment
  enableRouter: true

  # Number of router replicas
  replicas: 1

  # Service discovery method (k8s or static)
  serviceDiscovery: k8s

  # Label selector for vLLM runtime pods
  k8sLabelSelector: "app=vllmruntime-pd-sample"

  # Routing strategy (roundrobin, session, kvaware, prefixaware, disaggregated_prefill)
  routingLogic: disaggregated_prefill

  # Engine statistics collection interval
  engineScrapeInterval: 30

  # Request statistics window
  requestStatsWindow: 60

  # Container port for the router service
  port: 80

  # Service account name
  serviceAccountName: vllmrouter-sa

  # Image configuration
  image:
    registry: docker.io
    name: xueey7/vllm-router:fix-pd-labels-v4
    pullPolicy: IfNotPresent

  # Resource requirements
  resources:
    cpu: "2"
    memory: "8Gi"

  # Extra arguments for router
  extraArgs:
    - "--prefill-model-labels"
    - "Llama-3.2-3B-Instruct-prefill"
    - "--decode-model-labels"
    - "Llama-3.2-3B-Instruct-decode"
    - "--nixl-proxy-host"
    - "0.0.0.0"
    - "--nixl-proxy-port"
    - "7500"
    - "--nixl-peer-host"
    - "0.0.0.0"
    - "--nixl-peer-init-port"
    - "7300"
    - "--nixl-peer-alloc-port"
    - "7400"
  
  # Environment variables
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: METRICS_ENABLED
      value: "true"
    - name: ENABLE_PD_DISAGGREGATION
      value: "true"
    - name: PD_PREFILL_SELECTOR
      value: "node-type=prefill"
    - name: PD_DECODE_SELECTOR
      value: "node-type=decode"

  # Node selector for pod scheduling
  nodeSelectorTerms:
    - matchExpressions:
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
